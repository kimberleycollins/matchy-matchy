<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Matchy Matchy!">
<title>Matchy Matchy!</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --cream: #fdf8f2;
    --card-back: #e8e0d8;
    --matched: #c8e0c0;
    --radius: 20px;
    --dot-border: #d0c8c0;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body { font-family: 'Nunito', sans-serif; background: var(--cream); min-height: 100vh; overflow-x: hidden; }

  /* ── HOME ── */
  #home-screen {
    display: flex; flex-direction: column; align-items: center;
    justify-content: center; min-height: 100vh; padding: 28px 16px 36px; gap: 24px;
  }
  .home-title { font-size: clamp(1.6rem,6vw,2.4rem); font-weight: 900; color: #3a3a3a; text-align: center; }
  .home-sub { font-size: clamp(0.78rem,2.8vw,0.95rem); font-weight: 700; color: #bbb; text-align: center; text-transform: uppercase; letter-spacing: 0.09em; margin-top: -8px; }

  /* Theme grid — 2 cols on mobile, 3 cols on wider screens */
  .theme-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 14px;
    width: 80%;
    max-width: 560px;
  }
  @media (min-width: 540px) {
    .theme-grid { grid-template-columns: repeat(3, 1fr); }
  }

  .theme-card {
    border-radius: 22px;
    padding: clamp(12px,3.5vw,20px);
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 10px; cursor: pointer; border: none;
    transition: transform 0.15s;
    min-height: clamp(100px,24vw,145px);
  }
  .theme-card:active { transform: scale(0.95); }

  .tc-trucks   { background: #f0ece8; }
  .tc-construction { background: #fef4e0; }
  .tc-jungle   { background: #eef4e0; }
  .tc-sea      { background: #e0f0f8; }
  .tc-insects  { background: #f0f4e0; }
  .tc-balloons { background: #f4e8f4; }

  .theme-img-strip { display: flex; gap: 4px; align-items: center; justify-content: center; }
  .theme-img-strip img { width: clamp(48px,14vw,72px); height: clamp(48px,14vw,72px); object-fit: contain; }
  .theme-name { font-size: clamp(0.82rem,3vw,1.05rem); font-weight: 900; color: #3a3a3a; text-align: center; line-height: 1.2; }


  /* ── GAME ── */
  #game-screen { display: none; min-height: 100vh; flex-direction: column; align-items: center; justify-content: center; overflow-y: auto; }

  .game-top {
    width: 92%; max-width: 560px;
    display: flex; align-items: center; justify-content: space-between;
    padding: 16px 0 0; flex-shrink: 0;
  }
  .back-btn { background: none; border: none; font-size: 1.8rem; cursor: pointer; }
  .dots-row { display: flex; gap: 10px; }
  .dot {
    width: 22px; height: 22px; border-radius: 50%;
    background: #fff; border: 2px solid var(--dot-border);
    transition: background 0.4s, border-color 0.4s, transform 0.4s;
  }
  .dot.lit { transform: scale(1.15); }

  .layout {
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 16px; width: 92%; max-width: 560px; padding: 16px 0 24px; flex: 1;
  }

  /* Grid: responsive columns */
  .grid {
    display: grid;
    gap: clamp(8px, 2.5vw, 14px);
    width: 100%;
    grid-template-columns: 1fr; /* mobile: 1 column */
  }
  @media (min-width: 600px) {
    .grid { grid-template-columns: repeat(2, 1fr); } /* iPad: 2 columns */
  }
  @media (min-width: 1024px) {
    .grid { grid-template-columns: repeat(4, 1fr); } /* iPad/desktop: 4 columns */
  }

  .card {
    aspect-ratio: 1; position: relative; cursor: pointer;
    transform-style: preserve-3d;
    transition: transform 0.45s cubic-bezier(0.4,0,0.2,1);
    border-radius: var(--radius); user-select: none;
    animation: cardIn 0.4s ease backwards;
  }
  .card.flipped { transform: rotateY(180deg); }
  .card.matched { transform: rotateY(180deg); pointer-events: none; }
  .card.matched .card-front { background: var(--matched); }
  .card.matched .card-img { animation: matchPop 0.5s cubic-bezier(0.34,1.56,0.64,1) forwards; }
  .card.wrong { animation: wrongShake 0.4s ease; }

  .card-back, .card-front {
    position: absolute; inset: 0; border-radius: var(--radius);
    backface-visibility: hidden; -webkit-backface-visibility: hidden;
    display: flex; align-items: center; justify-content: center;
    transition: background 0.3s;
  }
  .card-back { background: var(--card-back); }
  .card-back::after { content: "?"; font-size: clamp(1.2rem,4.5vw,2rem); color: rgba(160,150,140,0.35); }
  .card-front { transform: rotateY(180deg); background: white; padding: 10%; }
  .card-img { width: 100%; height: 100%; object-fit: contain; }

  /* ── WIN ── */
  #win-screen {
    display: none; position: fixed; inset: 0;
    background: rgba(253,248,242,0.96);
    flex-direction: column; align-items: center; justify-content: center;
    z-index: 100; gap: 20px; text-align: center; padding: 32px;
  }
  #win-screen.show { display: flex; }
  .win-emoji { font-size: 5rem; animation: winBounce 0.8s cubic-bezier(0.34,1.56,0.64,1) forwards; }
  .win-title { font-size: clamp(2rem,8vw,3.5rem); font-weight: 900; color: #3a3a3a; }
  .win-sub { font-size: clamp(1rem,3.5vw,1.3rem); color: #7bbf7a; font-weight: 700; }
  .btn { padding: 16px 40px; font-family: 'Nunito', sans-serif; font-size: clamp(1rem,3.5vw,1.4rem); font-weight: 900; background: #7bbf7a; color: white; border: none; border-radius: 60px; cursor: pointer; transition: transform 0.15s; }
  .btn.secondary { background: #d8d0cc; }
  .btn:active { transform: scale(0.96); }
  .btn-row { display: flex; gap: 12px; flex-wrap: wrap; justify-content: center; }

  .confetti-piece { position: fixed; border-radius: 50%; animation: confettiFall linear forwards; pointer-events: none; z-index: 99; }

  @keyframes cardIn { from{transform:scale(0.7);opacity:0} to{transform:scale(1);opacity:1} }
  @keyframes wrongShake { 0%,100%{transform:rotateY(180deg) translateX(0)} 20%{transform:rotateY(180deg) translateX(-6px)} 60%{transform:rotateY(180deg) translateX(6px)} }
  @keyframes matchPop { 0%{transform:scale(1)} 50%{transform:scale(1.3)} 100%{transform:scale(1.1)} }
  @keyframes winBounce { 0%{transform:scale(0) rotate(-15deg)} 70%{transform:scale(1.2) rotate(5deg)} 100%{transform:scale(1) rotate(0)} }
  @keyframes confettiFall { 0%{transform:translateY(-20px) rotate(0deg);opacity:1} 100%{transform:translateY(110vh) rotate(720deg);opacity:0} }
</style>
</head>
<body>

<div id="home-screen">
  <div class="home-title">Matchy Matchy!</div>
  <div class="home-sub">Pick a theme...</div>
  <div class="theme-grid" id="theme-grid"></div>
</div>

<div id="game-screen">
  <div class="game-top">
    <button class="back-btn" onclick="goHome()">🏠</button>
    <div class="dots-row" id="dots-row"></div>
    <div style="width:1.8rem"></div>
  </div>
  <div class="layout">
    <div class="grid" id="grid"></div>
  </div>
</div>

<div id="win-screen">
  <div class="win-emoji">🌟</div>
  <div class="win-title">You did it!</div>
  <div class="win-sub" id="win-sub">Amazing!</div>
  <div class="btn-row">
    <button class="btn" id="play-again-btn">Play again</button>
    <button class="btn secondary" onclick="goHome()">Different category</button>
  </div>
</div>

<script>
// ─────────────────────────────────────────────────────────────────────────
// All image files must be in the SAME folder as this HTML file.
// File naming convention used:
//   monster-truck-1.png … monster-truck-5.png
//   construction-1.png  … construction-5.png
//   jungle-animals-1.png … jungle-animals-5.png
//   sea-creatures-1.png … sea-creatures-5.png
//   bug-1.png           … bug-5.png
//   balloon-1.png       … balloon-5.png
// ─────────────────────────────────────────────────────────────────────────

const THEMES = [
  {
    id: 'trucks', name: 'Monster Trucks', bg: 'tc-trucks', dotColor: '#c86040',
    items: [
      { src: 'monster-truck-1.png', label: 'truck1' },
      { src: 'monster-truck-2.png', label: 'truck2' },
      { src: 'monster-truck-3.png', label: 'truck3' },
      { src: 'monster-truck-4.png', label: 'truck4' },
      { src: 'monster-truck-5.png', label: 'truck5' },
    ]
  },
  {
    id: 'construction', name: 'Construction', bg: 'tc-construction', dotColor: '#d09030',
    items: [
      { src: 'construction-1.png', label: 'con1' },
      { src: 'construction-2.png', label: 'con2' },
      { src: 'construction-3.png', label: 'con3' },
      { src: 'construction-4.png', label: 'con4' },
      { src: 'construction-5.png', label: 'con5' },
    ]
  },
  {
    id: 'jungle', name: 'Jungle Animals', bg: 'tc-jungle', dotColor: '#70a030',
    items: [
      { src: 'jungle-animals-1.png', label: 'jungle1' },
      { src: 'jungle-animals-2.png', label: 'jungle2' },
      { src: 'jungle-animals-3.png', label: 'jungle3' },
      { src: 'jungle-animals-4.png', label: 'jungle4' },
      { src: 'jungle-animals-5.png', label: 'jungle5' },
    ]
  },
  {
    id: 'sea', name: 'Sea Creatures', bg: 'tc-sea', dotColor: '#3080c0',
    items: [
      { src: 'sea-creatures-1.png', label: 'sea1' },
      { src: 'sea-creatures-2.png', label: 'sea2' },
      { src: 'sea-creatures-3.png', label: 'sea3' },
      { src: 'sea-creatures-4.png', label: 'sea4' },
      { src: 'sea-creatures-5.png', label: 'sea5' },
    ]
  },
  {
    id: 'insects', name: 'Insects', bg: 'tc-insects', dotColor: '#70a040',
    items: [
      { src: 'bug-1.png', label: 'bug1' },
      { src: 'bug-2.png', label: 'bug2' },
      { src: 'bug-3.png', label: 'bug3' },
      { src: 'bug-4.png', label: 'bug4' },
      { src: 'bug-5.png', label: 'bug5' },
    ]
  },
  {
    id: 'balloons', name: 'Hot Air Balloons', bg: 'tc-balloons', dotColor: '#a060c0',
    items: [
      { src: 'balloon-1.png', label: 'balloon1' },
      { src: 'balloon-2.png', label: 'balloon2' },
      { src: 'balloon-3.png', label: 'balloon3' },
      { src: 'balloon-4.png', label: 'balloon4' },
      { src: 'balloon-5.png', label: 'balloon5' },
    ]
  },
];

let currentTheme = null, currentPairs = 4;
let flipped = [], matchedCount = 0, locked = false, dotsEarned = 0;

const shuffle = a => {
  const b = [...a];
  for (let i = b.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [b[i], b[j]] = [b[j], b[i]];
  }
  return b;
};

// ── BUILD HOME ──────────────────────────────────────────────
function buildHome() {
  const grid = document.getElementById('theme-grid');
  grid.innerHTML = '';

  THEMES.forEach(theme => {
    const card = document.createElement('button');
    card.className = 'theme-card ' + theme.bg;
    // Show first 3 images as a preview strip
    const strip = theme.items.slice(0, 1)
      .map(it => `<img src="${it.src}" alt="${it.label}">`)
      .join('');
    card.innerHTML = `<div class="theme-img-strip">${strip}</div><span class="theme-name">${theme.name}</span>`;
    card.addEventListener('click', () => { currentTheme = theme; startGame(); });
    grid.appendChild(card);
  });

}

// ── START GAME ──────────────────────────────────────────────
function startGame() {
  document.getElementById('home-screen').style.display = 'none';
  document.getElementById('game-screen').style.display = 'flex';
  document.getElementById('win-screen').classList.remove('show');
  flipped = []; matchedCount = 0; locked = false; dotsEarned = 0;

  const dotColor = currentTheme.dotColor || '#7bbf7a';
  window._dotColor = dotColor;

  // Dots
  const dotsRow = document.getElementById('dots-row');
  dotsRow.innerHTML = '';
  for (let i = 0; i < currentPairs; i++) {
    const d = document.createElement('div');
    d.className = 'dot'; d.id = 'dot-' + i;
    dotsRow.appendChild(d);
  }

  // Choose items & build card pairs
  const chosen = shuffle(currentTheme.items).slice(0, currentPairs);
  const cards = shuffle([...chosen, ...chosen]);

  // 4 pairs = 8 cards → 4 columns × 2 rows
  const grid = document.getElementById('grid');
  grid.className = 'grid';
  grid.innerHTML = '';

  cards.forEach((item, index) => {
    const card = document.createElement('div');
    card.className = 'card';
    card.dataset.id = item.label;
    card.style.animationDelay = index * 0.04 + 's';
    card.innerHTML = `
      <div class="card-back"></div>
      <div class="card-front"><img class="card-img" src="${item.src}" alt="${item.label}"></div>`;
    // Allow up to 12px of finger movement before treating as a drag
    card.addEventListener('touchstart', e => {
      card._tx = e.touches[0].clientX;
      card._ty = e.touches[0].clientY;
    }, { passive: true });
    card.addEventListener('touchend', e => {
      const dx = e.changedTouches[0].clientX - card._tx;
      const dy = e.changedTouches[0].clientY - card._ty;
      if (Math.sqrt(dx*dx + dy*dy) < 12) {
        e.preventDefault(); // suppress the synthetic click that follows
        handleTap(card);
      }
    });
    card.addEventListener('click', () => handleTap(card)); // mouse fallback
    grid.appendChild(card);
  });

  document.getElementById('play-again-btn').onclick = () => startGame();
}

// ── GAME LOGIC ──────────────────────────────────────────────
function handleTap(card) {
  if (locked || card.classList.contains('flipped') || card.classList.contains('matched')) return;
  card.classList.add('flipped');
  flipped.push(card);
  if (flipped.length === 2) { locked = true; checkMatch(); }
}

function checkMatch() {
  const [a, b] = flipped;
  if (a.dataset.id === b.dataset.id) {
    setTimeout(() => {
      a.classList.add('matched'); b.classList.add('matched');
      const d = document.getElementById('dot-' + dotsEarned);
      if (d) {
        dotsEarned++;
        setTimeout(() => {
          d.classList.add('lit');
          d.style.background = window._dotColor;
          d.style.borderColor = window._dotColor;
        }, 80);
      }
      matchedCount++; flipped = []; locked = false;
      if (matchedCount === currentPairs) setTimeout(showWin, 500);
    }, 300);
  } else {
    a.classList.add('wrong'); b.classList.add('wrong');
    setTimeout(() => {
      a.classList.remove('flipped', 'wrong');
      b.classList.remove('flipped', 'wrong');
      flipped = []; locked = false;
    }, 900);
  }
}

function showWin() {
  confettiGo();
  document.getElementById('win-sub').textContent = currentTheme.name + ' — well done! 🎉';
  document.getElementById('win-screen').classList.add('show');
}

function goHome() {
  document.getElementById('win-screen').classList.remove('show');
  document.getElementById('game-screen').style.display = 'none';
  document.getElementById('home-screen').style.display = 'flex';
}

function confettiGo() {
  const colors = ['#f5c9a8','#b8d4c0','#d4c4e8','#f5e4a8','#a8c8e8','#f0c4c4'];
  for (let i = 0; i < 55; i++) setTimeout(() => {
    const c = document.createElement('div'); c.className = 'confetti-piece';
    c.style.left = Math.random() * 100 + 'vw';
    c.style.background = colors[Math.floor(Math.random() * colors.length)];
    c.style.width = (8 + Math.random() * 8) + 'px';
    c.style.height = (8 + Math.random() * 8) + 'px';
    c.style.animationDuration = (1.8 + Math.random() * 1.8) + 's';
    c.style.borderRadius = Math.random() > 0.5 ? '50%' : '3px';
    document.body.appendChild(c); setTimeout(() => c.remove(), 4000);
  }, i * 40);
}

buildHome();
</script>
</body>
</html>
